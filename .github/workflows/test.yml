name: Test Suite

on:
  push:
    branches: [main]
    paths:
      - 'orbiter/**/*.py'
      - 'tests/**/*.py'
      - 'requirements.txt'
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install TA-Lib
        run: |
          wget -q https://sourceforge.net/projects/ta-lib/files/ta-lib/0.4.0/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr > /dev/null 2>&1
          make > /dev/null 2>&1
          sudo make install > /dev/null 2>&1
          cd ..
          pip install TA-Lib > /dev/null 2>&1
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -q pytest pytest-asyncio pytest-mock pyyaml pandas
          pip install NorenRestApiPy websocket google-genai gspread oauth2client yfinance
      
      - name: Run unit tests (no broker required)
        run: |
          python -m pytest orbiter/tests/ \
            -v \
            --tb=short \
            --ignore=orbiter/tests/brokers \
            --ignore=orbiter/tests/flow/test_mcx_filter_order_flow.py \
            --ignore=orbiter/tests/unit/test_fact_calculator_adx_fallback.py \
            --ignore=orbiter/tests/unit/test_instrument_fact_notation.py \
            --ignore=orbiter/tests/unit/test_main_orchestration.py \
            --ignore=orbiter/tests/unit/test_order_executor.py \
            --ignore=orbiter/tests/test_ai.py \
            --ignore=orbiter/tests/test_websocket_ping_patch.py \
            --ignore=orbiter/tests/unit/test_system_utils.py \
            --ignore=orbiter/tests/unit/test_ta_utils.py \
            --ignore=orbiter/tests/unit/test_technical_analyzer_real_data.py \
            --ignore=orbiter/tests/unit/test_token_resolution.py \
            --ignore=orbiter/tests/unit/test_tp_retracement_sl_filter.py \
            --ignore=orbiter/tests/unit/test_tp_trailing_sl_filter.py \
            --ignore=orbiter/tests/unit/test_sl_atr_filter.py \
            --ignore=orbiter/tests/unit/test_summary_manager.py \
            --ignore=orbiter/tests/unit/test_syncer.py \
            --ignore=orbiter/tests/unit/test_option_action_executor.py \
            --ignore=orbiter/tests/unit/test_persistence.py \
            --ignore=orbiter/tests/unit/test_priming.py \
            --ignore=orbiter/tests/unit/test_project_integrity.py \
            --ignore=orbiter/tests/unit/test_rule_manager_real_data.py \
            --ignore=orbiter/tests/unit/test_scenarios.py \
            --ignore=orbiter/tests/unit/test_config_validation.py \
            --ignore=orbiter/tests/test_analytics_and_sync.py \
            --ignore=orbiter/tests/test_scan_logic.py \
            --ignore=orbiter/tests/unit/test_broker_logic.py \
            --ignore=orbiter/tests/unit/test_core_engine_tick_real_data.py \
            --ignore=orbiter/tests/unit/test_fact_calculator_real_data.py \
            --ignore=orbiter/tests/unit/test_fact_converter.py \
            --ignore=orbiter/tests/unit/test_mcx_broker_data.py \
            --ignore=orbiter/tests/unit/test_mcx_config.py \
            --ignore=orbiter/tests/unit/test_mcx_live_data_all_instruments.py \
            --ignore=orbiter/tests/unit/test_mcx_parity.py \
            --ignore=orbiter/tests/unit/test_mcx_scoring_all_instruments.py \
            --ignore=orbiter/tests/unit/test_no_data_handling.py \
            --ignore=orbiter/tests/unit/test_action_executors.py \
            --no-header \
            -q
      
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            orbiter/tests/*.log
            orbiter/logs/*.log
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check Python syntax
        run: |
          find orbiter -name "*.py" -exec python -m py_compile {} + || exit 1
      
      - name: Check for common issues
        run: |
          # Check for debug statements left in code
          grep -r "import pdb" orbiter/ || true
          grep -r "import ipdb" orbiter/ || true
          grep -r "breakpoint()" orbiter/ || true

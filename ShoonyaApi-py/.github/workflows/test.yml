name: Test

on:
  push:
    branches: [main, master]
    paths:
      - 'ShoonyaApi-py/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ShoonyaApi-py/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install pyyaml xlsxwriter
          # Install the custom API wheel
          pip install ShoonyaApi-py/dist/NorenRestApi-0.0.30-py2.py3-none-any.whl
          
      - name: Run unit tests
        working-directory: ./ShoonyaApi-py
        run: pytest tests/ -m "not integration" -v --tb=short
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ShoonyaApi-py/test-results/
          retention-days: 7
